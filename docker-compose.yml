services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    mem_limit: 300m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Read-only opportunity detector — no key used, sends Telegram alerts when a
  # chain has genuinely profitable harvests, a new chain launches, or new
  # vaults appear. Uses .env only for the Telegram credentials.
  scanner:
    build: .
    command: ["node", "scanner.js"]
    restart: unless-stopped
    env_file: .env
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    mem_limit: 300m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # Read-only Morpho Blue liquidation watcher (Base) — alerts when a priced,
  # non-dust position stays liquidatable past the pro-bot reaction window.
  morpho-watcher:
    build: .
    command: ["node", "morpho-watcher.js"]
    restart: unless-stopped
    env_file: .env
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    mem_limit: 300m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

